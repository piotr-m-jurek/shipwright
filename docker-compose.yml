services:
  # postgres service:
  # - Image: pgvector/pgvector:pg17
  # - Environment: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
  # - Port: 5432:5432
  # - Volume: named volume so data persists across restarts
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5433:5432
    volumes:
      - db_data:/etc/pg/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

  # - Image: rustfs/rustfs (check Docker Hub for the exact tag)
  # - Environment: RUSTFS_ACCESS_KEY, RUSTFS_SECRET_KEY
  # - Port: 9000:9000 (S3-compatible API)
  # - Volume: named volume for data
  rustfs:
    image: rustfs/rustfs
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
    ports:
      - 9000:9000
    volumes:
      - rustfs_data:/etc/rustfs/data

volumes:
  db_data:
  rustfs_data:
